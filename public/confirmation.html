<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Confirmation</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main>
    <h1>📬 Order Submitted Successfully</h1>
    <p>Your Job ID: <strong id="job-id">Loading...</strong></p>
    <p>Submitted at: <span id="submitted-at">Loading...</span></p>

    <div id="cost-summary">
      <h3>Estimated Cost</h3>
      <p><em>Coming soon: Full pricing breakdown</em></p>
    </div>

    <div id="file-summary">
      <h3>Uploaded Files</h3>
      <ul id="file-list"></ul>
    </div>

    <p>
      <a href="/" class="button">Return to Dashboard</a>
    </p>
  </main>

  <script src="/confirmation.js"></script>
</body>
</html>
