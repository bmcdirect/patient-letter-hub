<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - PatientLetterHub</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .register-container {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      color: #333;
      margin: 0;
      font-size: 1.8rem;
      font-weight: 600;
    }
    
    .logo p {
      color: #666;
      margin: 0.5rem 0 0 0;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #333;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .register-btn {
      width: 100%;
      background: #667eea;
      color: white;
      border: none;
      padding: 0.875rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 1rem;
    }
    
    .register-btn:hover {
      background: #5a6fd8;
    }
    
    .register-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }
    
    .login-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    
    .login-link a:hover {
      text-decoration: underline;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #fcc;
      font-size: 0.9rem;
    }
    
    .success {
      background: #efe;
      color: #363;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #cfc;
      font-size: 0.9rem;
    }
    
    .password-requirements {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="logo">
      <h1>PatientLetterHub</h1>
      <p>Create Your Account</p>
    </div>
    
    <div id="message-container"></div>
    
    <form id="register-form">
      <!-- Practice Information Section -->
      <div class="form-section">
        <h3>Practice Information</h3>
        <div class="form-group">
          <label for="practiceName">Practice Name *</label>
          <input type="text" id="practiceName" name="practiceName" required />
        </div>
      </div>

      <!-- Contact Information Section -->
      <div class="form-section">
        <h3>Primary Contact</h3>
        <div class="form-row">
          <div class="form-group">
            <label for="prefix">Prefix</label>
            <select id="prefix" name="prefix">
              <option value="">Select...</option>
              <option value="Dr.">Dr.</option>
              <option value="Mr.">Mr.</option>
              <option value="Ms.">Ms.</option>
              <option value="Mrs.">Mrs.</option>
            </select>
          </div>
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" required />
          </div>
          <div class="form-group">
            <label for="middleInitial">MI</label>
            <input type="text" id="middleInitial" name="middleInitial" maxlength="1" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" required />
          </div>
          <div class="form-group">
            <label for="suffix">Suffix</label>
            <select id="suffix" name="suffix">
              <option value="">Select...</option>
              <option value="Jr.">Jr.</option>
              <option value="Sr.">Sr.</option>
              <option value="II">II</option>
              <option value="III">III</option>
              <option value="IV">IV</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Practice Address Section -->
      <div class="form-section">
        <h3>Practice Address</h3>
        <div class="form-group">
          <label for="address1">Address Line 1 *</label>
          <input type="text" id="address1" name="address1" required />
        </div>
        <div class="form-group">
          <label for="address2">Address Line 2</label>
          <input type="text" id="address2" name="address2" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="city">City *</label>
            <input type="text" id="city" name="city" required />
          </div>
          <div class="form-group">
            <label for="state">State *</label>
            <input type="text" id="state" name="state" required maxlength="2" placeholder="CA" />
          </div>
          <div class="form-group">
            <label for="zipCode">ZIP Code *</label>
            <input type="text" id="zipCode" name="zipCode" required pattern="[0-9]{5}(-[0-9]{4})?" placeholder="12345" />
          </div>
        </div>
      </div>

      <!-- Contact Details Section -->
      <div class="form-section">
        <h3>Contact Information</h3>
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="form-group">
          <label for="officeNumber">Office Phone Number *</label>
          <input type="tel" id="officeNumber" name="officeNumber" required placeholder="(555) 123-4567" />
        </div>
      </div>

      <!-- Account Security Section -->
      <div class="form-section">
        <h3>Account Security</h3>
        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" required minlength="6" />
          <div class="password-requirements">
            Minimum 6 characters required
          </div>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password *</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required />
        </div>
      </div>

      <button type="submit" class="register-btn">Create Account & Practice Profile</button>
    </form>
    
    <div class="login-link">
      Already have an account? <a href="/login.html">Sign in here</a>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('register-form');
    const messageContainer = document.getElementById('message-container');
    
    function showMessage(message, type = 'error') {
      messageContainer.innerHTML = `<div class="${type}">${message}</div>`;
    }
    
    function clearMessage() {
      messageContainer.innerHTML = '';
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();
      
      const submitBtn = form.querySelector('.register-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';
      
      const formData = new FormData(form);
      const password = formData.get('password');
      const confirmPassword = formData.get('confirmPassword');
      
      if (password !== confirmPassword) {
        showMessage('Passwords do not match');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
        return;
      }
      
      const data = {
        // User account data
        email: formData.get('email'),
        firstName: formData.get('firstName'),
        lastName: formData.get('lastName'),
        password: password,
        
        // Practice data
        practiceName: formData.get('practiceName'),
        prefix: formData.get('prefix'),
        middleInitial: formData.get('middleInitial'),
        suffix: formData.get('suffix'),
        address1: formData.get('address1'),
        address2: formData.get('address2'),
        city: formData.get('city'),
        state: formData.get('state'),
        zipCode: formData.get('zipCode'),
        officeNumber: formData.get('officeNumber')
      };
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (result.success) {
          showMessage('Account created successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.href = '/login.html';
          }, 2000);
        } else {
          showMessage(result.message || 'Registration failed');
        }
        
      } catch (err) {
        showMessage('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
