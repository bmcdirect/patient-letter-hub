<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - PatientLetterHub</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      color: #333;
      margin: 0;
      font-size: 1.8rem;
      font-weight: 600;
    }
    
    .logo p {
      color: #666;
      margin: 0.5rem 0 0 0;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: #333;
    }
    
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .login-btn {
      width: 100%;
      background: #667eea;
      color: white;
      border: none;
      padding: 0.875rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-bottom: 1rem;
    }
    
    .login-btn:hover {
      background: #5a6fd8;
    }
    
    .login-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }
    
    .register-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    
    .register-link a:hover {
      text-decoration: underline;
    }
    
    .error {
      background: #fee;
      color: #c33;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #fcc;
      font-size: 0.9rem;
    }
    
    .success {
      background: #efe;
      color: #363;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #cfc;
      font-size: 0.9rem;
    }
    
    .demo-users {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }
    
    .demo-users h4 {
      margin: 0 0 0.5rem 0;
      color: #333;
    }
    
    .demo-users p {
      margin: 0.25rem 0;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>PatientLetterHub</h1>
      <p>Healthcare Communication Platform</p>
    </div>
    
    <div id="message-container"></div>
    
    <div class="demo-users">
      <h4>Demo Accounts:</h4>
      <p><strong>Admin:</strong> admin@demo.com / admin123</p>
      <p><strong>User:</strong> user@demo.com / user123</p>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required />
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    
    <div class="register-link">
      Don't have an account? <a href="/register.html">Create one here</a>
    </div>
  </div>
  
  <script>
    const form = document.getElementById('login-form');
    const messageContainer = document.getElementById('message-container');
    
    // Check if already logged in
    checkAuthStatus();
    
    async function checkAuthStatus() {
      try {
        const res = await fetch('/api/auth/user');
        if (res.ok) {
          const data = await res.json();
          if (data.success) {
            // Already logged in, redirect based on role
            if (data.user.is_admin) {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/dashboard.html';
            }
          }
        }
      } catch (err) {
        // Not logged in, continue with login form
      }
    }
    
    function showMessage(message, type = 'error') {
      messageContainer.innerHTML = `<div class="${type}">${message}</div>`;
    }
    
    function clearMessage() {
      messageContainer.innerHTML = '';
    }
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();
      
      const submitBtn = form.querySelector('.login-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';
      
      const formData = new FormData(form);
      const data = {
        email: formData.get('email'),
        password: formData.get('password')
      };
      
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });
        
        const result = await res.json();
        
        if (result.success) {
          showMessage('Login successful! Redirecting...', 'success');
          
          // Redirect based on user role
          setTimeout(() => {
            if (result.user.is_admin) {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/dashboard.html';
            }
          }, 1000);
          
        } else {
          showMessage(result.message || 'Login failed');
        }
        
      } catch (err) {
        showMessage('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
